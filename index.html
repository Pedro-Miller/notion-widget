<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        /* CSS para garantir que o widget seja invisível e a imagem perfeita */
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            overflow: hidden; background: transparent; 
        }
        #img-container {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        img { 
            width: 100%; height: 100%; 
            object-fit: cover; /* Estilo background-cover */
            display: block; opacity: 0;
            transition: opacity 0.5s ease-in;
        }
    </style>
</head>
<body>
    <div id="img-container">
        <img id="asset" src="" alt="">
    </div>

    <script>
    const pinterestBoard = "https://br.pinterest.com/pedromiller0573/notion/";
    
    async function loadAsset() {
        const imgElement = document.getElementById("asset");
        
        try {
            // 1. Geramos um RSS URL único para enganar a cache do Pinterest
            const rssUrl = pinterestBoard.replace(/\/$/, "") + ".rss/?nocache=" + Date.now();
            
            // 2. Geramos um Proxy URL único para enganar a cache do AllOrigins
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}&_=${Date.now()}`;
            
            const res = await fetch(proxyUrl);
            const data = await res.json();
            
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(data.contents, "text/xml");
            const items = xmlDoc.getElementsByTagName("item");

            // LOG DE DEBUG: Abre a consola (F12) no browser para ver isto
            console.log("Pins encontrados no feed:", items.length);

            if (items.length > 0) {
                // Sorteio puramente aleatório no cliente
                const randomIndex = Math.floor(Math.random() * items.length);
                const randomItem = items[randomIndex];
                const description = randomItem.getElementsByTagName("description")[0].textContent;
                
                const imgRegex = /src="([^"]+)"/;
                const match = description.match(imgRegex);
                
                if (match && match[1]) {
                    const highRes = match[1].replace(/\/\d+x\//, "/originals/");
                    
                    imgElement.style.opacity = "0";
                    setTimeout(() => {
                        imgElement.src = highRes;
                    }, 500);

                    imgElement.onload = () => imgElement.style.opacity = "1";
                    return;
                }
            }
        } catch (err) { 
            console.error("Erro na carga:", err);
        }
    }

    // Delay inicial aleatório para desincronizar widgets
    setTimeout(loadAsset, Math.floor(Math.random() * 3000));

    // Loop de 5 minutos
    setInterval(loadAsset, 300000);
</script>
</body>
</html>
