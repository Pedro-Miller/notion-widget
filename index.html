<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        /* CSS para garantir que o widget seja invisível e a imagem perfeita */
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            overflow: hidden; background: transparent; 
        }
        #img-container {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        img { 
            width: 100%; height: 100%; 
            object-fit: cover; /* Estilo background-cover */
            display: block; opacity: 0;
            transition: opacity 0.5s ease-in;
        }
    </style>
</head>
<body>
    <div id="img-container">
        <img id="asset" src="" alt="">
    </div>

    <script>
    const pinterestBoard = "https://br.pinterest.com/pedromiller0573/notion/";
    const rssUrl = pinterestBoard.replace(/\/$/, "") + ".rss/";

    async function loadAsset() {
        try {
            // Cache buster dinâmico para forçar o sorteio no servidor
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&t=${Date.now()}`;
            
            const res = await fetch(apiUrl);
            const data = await res.json();
            
            if (data.status === 'ok' && data.items.length > 0) {
                const randomItem = data.items[Math.floor(Math.random() * data.items.length)];
                const imgRegex = /src="([^"]+)"/;
                const match = randomItem.description.match(imgRegex);
                
                if (match && match[1]) {
                    // Força alta resolução (Originals)
                    const highRes = match[1].replace(/\/\d+x\//, "/originals/");
                    const img = document.getElementById("asset");

                    // Efeito de transição
                    img.style.opacity = "0";

                    setTimeout(() => {
                        img.src = highRes;
                    }, 500); 

                    img.onload = () => {
                        img.style.opacity = "1";
                    };
                }
            }
        } catch (err) { 
            console.error("Erro ao carregar feed."); 
        }
    }

    // --- Lógica de Inicialização (Anti-Sincronização) ---

    // 1. Delay inicial aleatório (0 a 5 segundos)
    // Garante que cada widget comece em um momento diferente
    const stagger = Math.floor(Math.random() * 5000); 
    setTimeout(loadAsset, stagger);

    // 2. Loop de 5 minutos + "Ruído" aleatório (0 a 30 segundos)
    // Impede que os widgets troquem a imagem todos ao mesmo tempo depois do load
    const noise = Math.floor(Math.random() * 30000); 
    setInterval(loadAsset, 300000 + noise);
</script>
</body>
</html>
